version: "3.9"

services:
  # Database: MySQL 8.4 (LTS)
  db:
    image: mysql:8.4
    container_name: gym-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gym_management
      MYSQL_USER: gym_admin
      MYSQL_PASSWORD: gym_password123
    volumes:
      - gym_db_data:/var/lib/mysql
    networks:
      - gym_net

  # Backend: PHP 8.4-FPM
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gym-app
    restart: unless-stopped
    working_dir: /var/www/laravel
    volumes:
      - ./laravel:/var/www/laravel
    depends_on:
      - db
    networks:
      - gym_net

  # Web Server: Nginx
  nginx:
    image: nginx:stable-alpine
    container_name: gym-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./laravel:/var/www/laravel
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - gym_net

  # Frontend Tooling: Node 22 (Current LTS)
  node:
    image: node:22-alpine
    container_name: gym-node
    working_dir: /var/www/laravel
    volumes:
      - ./laravel:/var/www/laravel
    ports:
      - "5173:5173" # Vite Dev Server
    networks:
      - gym_net
    # Use this to run 'npm run dev' automatically on start
    command: sh -c "npm install && npm run dev -- --host"

networks:
  gym_net:
    driver: bridge

volumes:
  gym_db_data: